  - ps: If ($env:APPVEYOR_REPO_TAG -eq "true" ) { Push-AppveyorArtifact prebuilds -FileName $(APPVEYOR_REPO_TAG_NAME)-win-$(PLATFORM) -Type zip }

deploy:
  - provider: GitHub
    artifact: /.*\.zip/
    draft: false
    prerelease: true
    auth_token:
      secure: LmtUDSct7WXwF0+0q8Lm55Wi1A0SLsh+GMOIvu7XondTiBA6Z+TfBHLwhOY681/o
    on:
      APPVEYOR_REPO_TAG: true
      nodejs_version: "Current"
